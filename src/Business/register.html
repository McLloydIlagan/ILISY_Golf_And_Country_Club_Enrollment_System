<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Private Golf Club</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Georgia", serif;
    }

    body { color: white; }

    .hero {
        height: 100vh;
        background: url('Golfcourse_assets/golfcourse_bg.jpg') no-repeat center/cover;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
    }

    .navbar {
        position: absolute;
        top: 0;
        width: 100%;
        padding: 20px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }

    .logo img { width: 60px; }

    .nav-links a {
        text-decoration: none;
        color: white;
        margin-left: 30px;
        font-size: 14px;
        transition: 0.3s;
    }

    .nav-links a:hover { color: #d4b36a; }

    /* REGISTER CARD */
    .reg-card {
        position: relative;
        z-index: 2;
        background: rgba(13, 43, 15, 0.9); /* Deep green matching brand */
        padding: 40px;
        border-radius: 10px;
        width: 100%;
        max-width: 450px;
        border-top: 4px solid #d4b36a;
        text-align: center;
    }

    .reg-card h2 {
        color: #d4b36a;
        margin-bottom: 10px;
        letter-spacing: 2px;
    }

    .reg-card p {
        font-size: 14px;
        margin-bottom: 30px;
        color: #ccc;
    }

    .input-group {
        text-align: left;
        margin-bottom: 15px;
    }

    .input-group label {
        display: block;
        font-size: 12px;
        margin-bottom: 5px;
        color: #d4b36a;
    }

    .input-group input {
        width: 100%;
        padding: 10px;
        border: none;
        background: #f0f0f0;
        border-radius: 3px;
    }

    .btn-reg {
        width: 100%;
        padding: 12px;
        background: #d4b36a;
        border: none;
        font-weight: bold;
        margin-top: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-reg:hover {
        background: #f1d592;
        transform: translateY(-2px);
    }

    .footer-link {
        margin-top: 20px;
        font-size: 13px;
    }

    .footer-link a {
        color: #d4b36a;
        text-decoration: none;
    }
</style>
</head>
<body>
    <section class="hero">
        <div class="navbar">
            <div class="logo">
                <img src="Golfcourse_assets/colored logo.png" alt="Logo">
            </div>
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="#">Membership</a>
                <a href="#">About Us</a>
                <a href="login.html" style="border:1px solid #d4b36a; padding: 5px 15px; border-radius: 20px;">Sign In</a>
            </div>
        </div>

        <div class="reg-card">
            <h2>REGISTER</h2>
            <p>Join the most exclusive club in the city.</p>
            <form>
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-reg">Create Account</button>
            </form>
            <div class="footer-link">
                Already a member? <a href="login.html">Login here</a>
            </div>
        </div>
    </section>
</body>
</html>
