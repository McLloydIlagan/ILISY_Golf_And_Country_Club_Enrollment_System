<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<Style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Georgia', serif;
}

body {
    height: 100vh;
}

/* LAYOUT */
.container {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: #0d2b0f;
    color: #d4c17c;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    width: 70%;
    text-align: center;
}

.logo {
    width: 60px;
    margin-bottom: 15px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    margin-bottom: 25px;
}

/* FORM */
form {
    text-align: left;
}

label {
    display: block;
    margin: 15px 0 5px;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 3px;
    background: #d9d9d9;
}

button {
    width: 100%;
    margin-top: 25px;
    padding: 10px;
    background: #c5a96b;
    border: none;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

/* DIVIDER */
.divider {
    margin: 25px 0;
    display: flex;
    align-items: center;
    text-align: center;
    color: #c5a96b;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid #c5a96b;
}

.divider span {
    margin: 0 10px;
}

/* GOOGLE BUTTON */
.google-btn {
    background: transparent;
    border: 1px solid #c5a96b;
    color: #c5a96b;
}

/* SIGNUP */
.signup {
    margin-top: 20px;
    font-size: 13px;
}

.signup a {
    color: #c5a96b;
    text-decoration: underline;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    background: url("Golfcourse_assets/golf_register_pic.jpg") no-repeat center/cover;
    position: relative;
}

/* NAVBAR */
nav {
    position: absolute;
    top: 20px;
    right: 40px;
}

nav a {
    color: white;
    margin-left: 30px;
    text-decoration: none;
    font-size: 14px;
}

</Style>
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="login-box">
            
            <img src="Golfcourse_assets\colored logo.png" class="logo">

            <h1>LOGIN</h1>
            <p>Please enter your personal details below.</p>

            <form>
                <label>Email Address</label>
                <input type="email">

                <label>Password</label>
                <input type="password">

                <button type="submit">Login</button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <button class="google-btn">Login with Google</button>

            <p class="signup">
                Don’t have an account? <a href="register.html">Click here</a>
            </p>

        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <nav>
            <a href="#">Home</a>
            <a href="#">Membership</a>
            <a href="#">About Us</a>
            <a href="#">Contacts</a>
        </nav>
    </div>

</div>

</body>
</html>
