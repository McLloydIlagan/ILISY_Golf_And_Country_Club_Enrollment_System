<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Golf Club | Welcome</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Georgia", serif;
    }

    body {
        color: white;
        overflow: hidden;
    }

    .hero {
        height: 100vh;
        background: url('Golfcourse_assets/golfcourse_bg.jpg') no-repeat center/cover;
        position: relative;
    }

    .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
    }

    .navbar {
        position: absolute;
        top: 0;
        width: 100%;
        padding: 20px 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 2;
    }

    .logo img {
        width: 60px;
    }

    .nav-links {
        display: flex;
        gap: 30px;
        align-items: center;
    }

    .nav-links a {
        text-decoration: none;
        color: white;
        font-size: 14px;
        transition: color 0.3s ease, transform 0.3s ease;
    }

    .nav-links a:hover {
        color: #d4b36a;
        transform: translateY(-2px);
    }

    .sign-in {
        border: 1px solid #d4b36a;
        padding: 6px 20px;
        border-radius: 20px;
        transition: all 0.3s ease;
    }

    .sign-in:hover {
        background: #d4b36a;
        color: black;
        transform: scale(1.05);
    }

    .content {
        position: relative;
        z-index: 2;
        max-width: 600px;
        padding: 150px 60px;
    }

    .content h1 {
        font-size: 72px;
        line-height: 1.1;
        margin-bottom: 20px;
    }

    .line {
        width: 450px;
        height: 2px;
        background: #d4b36a;
        margin: 20px 0;
    }

    .content p {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 30px;
        color: #ddd;
    }

    .buttons {
        display: flex;
        gap: 15px;
    }

    .btn {
        padding: 12px 25px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
    }

    .btn-primary {
        background: #d4b36a;
        color: black;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background: #f1d592;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(212, 179, 106, 0.4);
    }

    .btn-outline {
        border: 1px solid #d4b36a;
        color: #d4b36a;
        background: transparent;
        transition: all 0.3s ease;
    }

    .btn-outline:hover {
        background: #d4b36a;
        color: black;
        transform: translateY(-3px);
    }
</style>
</head>
<body>
    <section class="hero">
        <div class="navbar">
            <div class="logo">
                <img src="Golfcourse_assets/colored logo.png" alt="Logo">
            </div>
            <div class="nav-links">
                <a href="homepage.html">Home</a>
                <a href="#">Membership</a>
                <a href="#">About Us</a>
                <a href="#">Contacts</a>
                <a href="login.html" class="sign-in">Sign In</a>
            </div>
        </div>

        <div class="content">
            <h1>Private<br>Golf Club</h1>
            <div class="line"></div>
            <p>Enjoy one of the most popular leisure activities with high-quality equipment, a well-maintained environment, and refreshing amenities.</p>
            <div class="buttons">
                <a href="register.html" class="btn btn-primary">Register Now</a>
                <a href="#" class="btn btn-outline">Learn More</a>
            </div>
        </div>
    </section>
</body>
</html>
