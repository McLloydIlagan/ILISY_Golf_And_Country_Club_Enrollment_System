<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Private Golf Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* LEFT SIDE */
        .left {
            width: 50%;
            background: #0d2b0f;
            color: #d4c17c;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 70%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 60px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 14px;
            margin-bottom: 25px;
            color: #a4966a;
        }

        /* FORM */
        form { text-align: left; }

        label {
            display: block;
            margin: 15px 0 5px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 3px;
            background: #d9d9d9;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #c5a96b;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #f1d592;
            transform: translateY(-2px);
        }

        /* DIVIDER */
        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: #c5a96b;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #c5a96b;
        }

        .divider span { margin: 0 10px; }

        .google-btn {
            background: transparent;
            border: 1px solid #c5a96b;
            color: #c5a96b;
        }

        .google-btn:hover {
            background: rgba(197, 169, 107, 0.1);
        }

        .signup {
            margin-top: 25px;
            font-size: 13px;
            color: white;
        }

        .signup a {
            color: #c5a96b;
            text-decoration: none;
            font-weight: bold;
        }

        .signup a:hover { text-decoration: underline; }

        /* RIGHT SIDE */
        .right {
            width: 50%;
            background: url("Golfcourse_assets/golf_register_pic.jpg") no-repeat center/cover;
            position: relative;
        }

        nav {
            position: absolute;
            top: 20px;
            right: 40px;
        }

        nav a {
            color: white;
            margin-left: 30px;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover { color: #d4b36a; }
    </style>
</head>
<body>
<div class="container">
    <div class="left">
        <div class="login-box">
            <img src="/Golfcourse_assets/colored logo.png" class="logo">
            <h1>LOGIN</h1>
            <p>Please enter your personal details below.</p>
            <form action="user_homepage.html"> <label>Email Address</label>
                <input type="email" required>
                <label>Password</label>
                <input type="password" required>
                <button type="submit">Login</button>
            </form>
            <div class="divider"><span>or</span></div>
            <button class="google-btn">Login with Google</button>
            <p class="signup">Don’t have an account? <a href="register.html">Click here</a></p>
        </div>
    </div>
    <div class="right">
        <nav>
            <a href="homepage.html">Home</a>
            <a href="#">Membership</a>
            <a href="#">About Us</a>
            <a href="#">Contacts</a>
        </nav>
    </div>
</div>
</body>
</html>
