<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membership Form | ILISY Golf Club</title>
    <style>
        :root {
            --gold: #d4b36a;
            --gold-light: #f1d592;
            --deep-green: #0d2b0f;
            --olive: #6b7e5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Georgia", serif; }
        body { background: #f0edf0; color: #333; }

        /* NAVBAR */
        .navbar {
            background: var(--deep-green);
            padding: 14px 50px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--gold);
        }
        .logo img { width: 45px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--gold); font-size: 14px; transition: color 0.3s; }
        .nav-links a:hover { color: white; }
        .logout-btn {
            border: 1px solid var(--gold); padding: 5px 18px;
            border-radius: 15px; transition: all 0.3s;
        }
        .logout-btn:hover { background: var(--gold); color: black !important; }

        /* PAGE HEADER */
        .page-header {
            background: #e8e4e8;
            padding: 28px 60px;
            border-bottom: 1px solid #ddd;
        }
        .page-header h1 { font-size: 28px; color: #222; }

        /* FORM CONTAINER */
        .form-container {
            max-width: 860px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            padding: 40px 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .section-title {
            font-size: 15px;
            color: #555;
            margin-bottom: 25px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group.span-2 { grid-column: span 2; }

        label {
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            background: #e8e8e8;
            border: none;
            padding: 11px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: "Georgia", serif;
            outline: none;
            transition: background 0.2s;
        }

        input:focus, select:focus { background: #ddd; }

        /* SUBMIT */
        .btn-apply {
            display: block;
            margin: 40px auto 0;
            padding: 13px 60px;
            background: var(--olive);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-family: "Georgia", serif;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-apply:hover { background: var(--deep-green); transform: translateY(-2px); }

        /* POPUP */
        .popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(4px);
        }
        .popup-card {
            background: var(--olive);
            width: 380px; padding: 45px 40px;
            text-align: center; color: white;
            border-radius: 8px;
        }
        .popup-card img { width: 70px; margin-bottom: 15px; }
        .popup-card hr { border: none; border-top: 1px solid var(--gold); margin: 15px 0 25px; }
        .popup-card h3 { font-size: 20px; margin-bottom: 15px; font-weight: normal; }
        .popup-card p { font-size: 14px; line-height: 1.7; color: #eee; }
        .popup-close {
            margin-top: 25px;
            padding: 10px 30px;
            background: var(--gold);
            border: none; color: black;
            cursor: pointer; border-radius: 4px;
            font-family: "Georgia", serif;
        }
    </style>
</head>
<body>

<div class="popup-overlay" id="popup">
    <div class="popup-card">
        <img src="../Golfcourse_assets/colored logo.png" alt="Logo">
        <hr>
        <h3>Thank you for choosing ILISY Club.</h3>
        <p>Your membership form is being processed. Kindly pay the membership fee to be part ILISY CLUB Membership.</p>
        <button class="popup-close" onclick="document.getElementById('popup').style.display='none'; window.location.href='payment_membership.html'">Proceed to Payment</button>
    </div>
</div>

<div class="navbar">
    <div class="logo"><img src="../Golfcourse_assets/colored logo.png" alt="ILISY"></div>
    <div class="nav-links">
        <a href="user_homepage.html">Home</a>
        <a href="membership_form.html">Membership</a>
        <a href="user_messages.html">Messages</a>
        <a href="user_reservation.html">Reservation</a>
        <a href="../login.html" class="logout-btn">Logout</a>
    </div>
</div>

<div class="page-header">
    <h1>Membership Form</h1>
</div>

<div class="form-container">
    <p class="section-title">Personal Details</p>
    <div class="form-grid">
        <div class="form-group"><label>First Name</label><input type="text" placeholder=""></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder=""></div>
        <div class="form-group"><label>Gender</label>
            <select><option value=""></option><option>Male</option><option>Female</option><option>Prefer not to say</option></select>
        </div>
        <div class="form-group"><label>Age</label><input type="number" placeholder=""></div>
    </div>
    <div class="form-grid-3">
        <div class="form-group"><label>Email Address</label><input type="email"></div>
        <div class="form-group"><label>Address</label><input type="text"></div>
        <div class="form-group"><label>Phone Number</label><input type="tel"></div>
    </div>

    <button class="btn-apply" onclick="document.getElementById('popup').style.display='flex'">Apply</button>
</div>

</body>
</html>
